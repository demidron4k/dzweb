<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vitala Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <div class="container">
      <nav>
        <h2>Vitala Dev</h2>
        <ul>
          <li><a href="#about">Обо мне</a></li>
          <li><a href="#skills">Навыки</a></li>
          <li><a href="#contact">Контакты</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero-card">
        <h1>Frontend Developer</h1>
        <p>Создаю адаптивные сайты</p>
        <button id="openModal">Связаться</button>
      </div>
    </div>
  </section>

  <section id="about">
    <div class="container">
      <div class="card">
        <h2>Обо мне</h2>
        <p>Меня зовут Виталя, я начинающий frontend разработчик.</p>
      </div>
    </div>
  </section>

  <section id="skills">
    <div class="container">
      <div class="card">
        <h2>Навыки</h2>
        <div class="skills">
          <div class="skill">HTML</div>
          <div class="skill">CSS</div>
          <div class="skill">JavaScript</div>
        </div>
      </div>
    </div>
  </section>

  <section id="contact">
    <div class="container">
      <div class="card">
        <h2>Контакты</h2>
        <p>Email: vitala@mail.com</p>
      </div>
    </div>
  </section>

  <footer>
    <div class="container">
      <p>2026 © Vitala</p>
    </div>
  </footer>
  <div class="modal" id="modal">
    <div class="modal-content">
      <span id="closeModal">&times;</span>
      <p>Спасибо! Мы свяжемся с вами.</p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
